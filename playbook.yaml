- hosts: all
  remote_user: ec2-user
  become: yes
  tasks:
  - name: Update All Packages
    yum:
      name: '*'
      state: latest
  - name: Install Apache
    yum: 
      name: httpd
      state: installed
    notify:
      - Reload Apache

  handlers:
    - name: Reload Apache
      service:
        name: httpd
        state: reloaded